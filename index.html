<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>doubts-AG · IA de dudas</title>
  <meta name="description" content="Asistente IA en verde para resolver dudas de todo tipo." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%2316a34a'/><text x='50' y='58' font-size='48' text-anchor='middle' fill='white' font-family='Arial'>AG</text></svg>">
  <link rel="stylesheet" href="/app.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">AG</div>
        <div class="titles">
          <h1>doubts-AG</h1>
          <p class="subtitle">Resuelve tus dudas al instante</p>
        </div>
      </div>
      <a class="repo" href="#" onclick="alert('¡Sube esta carpeta a tu GitHub!')">Ver en GitHub</a>
    </header>

    <main class="chat">
      <div id="messages" class="messages" aria-live="polite"></div>

      <form id="composer" class="composer" autocomplete="off">
        <input id="prompt" name="prompt" type="text" placeholder="Escribe tu duda…" required />
        <button id="send" type="submit" title="Enviar">Enviar</button>
      </form>
      <p class="hint">Consejo: pulsa <kbd>Enter</kbd> para enviar · <kbd>Shift</kbd> + <kbd>Enter</kbd> para nueva línea</p>
    </main>

    <footer class="footer">
      <span>Hecho con ❤ por doubts-AG</span>
    </footer>
  </div>

  <script src="/app.js" defer></script>
</body>
</html>
